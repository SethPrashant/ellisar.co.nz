<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Test Page — Live</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0f0e;
      --surface: #111714;
      --border: #1e2b26;
      --accent: #4ade80;
      --accent-dim: #22543d;
      --text: #e2ede8;
      --muted: #5a7a68;
      --font-display: 'DM Serif Display', serif;
      --font-mono: 'DM Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.5;
      z-index: 0;
    }

    /* Radial glow */
    body::after {
      content: '';
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(74,222,128,0.07) 0%, transparent 70%);
      z-index: 0;
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 1;
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 3rem 3.5rem;
      max-width: 560px;
      width: 90%;
      background: var(--surface);
      box-shadow: 0 0 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(74,222,128,0.05);
      animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--accent-dim);
      padding: 4px 10px;
      border-radius: 2px;
      margin-bottom: 1.5rem;
      animation: fadeUp 0.8s 0.1s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    h1 {
      font-family: var(--font-display);
      font-size: 2.4rem;
      line-height: 1.15;
      color: var(--text);
      margin-bottom: 1rem;
      animation: fadeUp 0.8s 0.15s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    h1 span {
      color: var(--accent);
    }

    p {
      font-size: 0.85rem;
      line-height: 1.75;
      color: var(--muted);
      margin-bottom: 2rem;
      animation: fadeUp 0.8s 0.2s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .meta {
      border-top: 1px solid var(--border);
      padding-top: 1.5rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      animation: fadeUp 0.8s 0.25s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .meta-item label {
      display: block;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .meta-item value {
      font-size: 0.82rem;
      color: var(--text);
    }

    .corner {
      position: absolute;
      width: 10px; height: 10px;
      border-color: var(--accent);
      border-style: solid;
      opacity: 0.6;
    }
    .corner.tl { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .corner.tr { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
    .corner.bl { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }
    .corner.br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }
  </style>
</head>
<body>
  <div class="card">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <div class="badge">
      <span class="dot"></span>
      Site is live
    </div>

    <h1>Your domain is <span>working.</span></h1>

    <p>
      This is a test page confirming that your domain is correctly pointed to GitHub Pages
      and your site is being served. Replace this file with your real content when ready.
    </p>

    <div class="meta">
      <div class="meta-item">
        <label>Hosted on</label>
        <value>GitHub Pages</value>
      </div>
      <div class="meta-item">
        <label>Status</label>
        <value>✓ Operational</value>
      </div>
      <div class="meta-item">
        <label>Date</label>
        <value id="date"></value>
      </div>
      <div class="meta-item">
        <label>Protocol</label>
        <value id="proto"></value>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('date').textContent = new Date().toLocaleDateString('en-NZ', { year:'numeric', month:'short', day:'numeric' });
    document.getElementById('proto').textContent = location.protocol === 'https:' ? '✓ HTTPS' : 'HTTP';
  </script>
</body>
</html>
